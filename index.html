<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eassy Office</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff; /* Plain White Background */
            font-family: 'DM Sans', sans-serif;
            color: #1a1a1a;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            letter-spacing: -2px;
            font-weight: 700;
        }

        p {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.2rem;
            font-weight: 400;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 30px;
            background-color: #000000;
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            min-width: 220px;
        }

        .btn:hover {
            background-color: #222222;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .btn.secondary {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
            box-shadow: none;
        }

        .btn.secondary:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Eassy Office</h1>
        <p>Your private workstation in the browser.</p>
        
        <div class="button-group">
            <!-- PDF Tools Link -->
            <a href="pdf-tools.html" class="btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20M7,13H17V11H7V13M7,17H17V15H7V17Z" />
                </svg>
                PDF TOOLS
            </a>

            <!-- Payroll Management Link -->
            <a href="payroll-manager.html" class="btn secondary">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14,10H10V14H14V10M16,4H15V2H13V4H11V2H9V4H8A2,2 0 0,0 6,6V20A2,2 0 0,0 8,22H16A2,2 0 0,0 18,20V6A2,2 0 0,0 16,4M16,20H8V8H16V20Z" />
                </svg>
                PAYROLL MANAGER
            </a>
        </div>
    </div>

</body>
</html>
