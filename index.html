<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eassy Office</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff; /* Plain White Background */
            font-family: 'DM Sans', sans-serif;
            color: #1a1a1a;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background-color: #000000;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background-color: #333333;
            transform: translateY(-2px);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Eassy Office</h1>
        <p>Simple. Private. Fast.</p>
        
        <!-- The Link Button -->
        <a href="pdf-tools.html" class="btn">
            <!-- PDF Icon (SVG) -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12,11.59L8,7.59V3H16V7.59L12,11.59M19,13H14.5V11L19,6.5V13M5,13H9.5V11L5,6.5V13M19,15H5V18H19V15M19,20H5C3.89,20 3,19.11 3,18V6C3,4.89 3.89,4 5,4H7V2H17V4H19C20.11,4 21,4.89 21,6V18C21,19.11 20.11,20 19,20Z" />
            </svg>
            PDF TOOLS
        </a>
    </div>

</body>
</html>
